<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<main class="w-full max-w-[390px] mx-auto min-h-screen flex flex-col px-container-margin py-stack-lg relative overflow-y-auto">
<!-- Progress Dots -->
<div class="flex justify-center items-center gap-2 mb-stack-lg mt-stack-md">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
</div>
<!-- Header Content -->
<header class="mb-stack-lg text-center">
<h1 class="font-display-lg text-display-lg text-primary mb-stack-sm">Tell us a bit about you</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">This helps the AI give you tips that actually make sense for where you live.</p>
</header>
<!-- Form Fields -->
<section class="flex flex-col gap-stack-md mb-stack-lg">
<!-- Name Field -->
<div class="relative bg-surface-container-lowest rounded-lg border border-outline-variant p-3 shadow-sm focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="name">Name</label>
<input class="w-full bg-transparent border-none p-0 font-body-md text-body-md text-on-background focus:ring-0 placeholder-outline" id="name" placeholder="Your name" type="text" value="Jebin Einstein"/>
</div>
<!-- City Field -->
<div class="relative bg-surface-container-lowest rounded-lg border border-outline-variant p-3 shadow-sm focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all flex items-center justify-between">
<div class="flex-grow">
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="city">City / Region</label>
<input class="w-full bg-transparent border-none p-0 font-body-md text-body-md text-on-background focus:ring-0 placeholder-outline" id="city" placeholder="Enter your city" type="text"/>
</div>
<button class="ml-3 font-label-md text-label-md text-primary bg-primary/10 px-3 py-1.5 rounded-full flex items-center gap-1 hover:bg-primary/20 transition-colors whitespace-nowrap">
                    Auto-detect <span class="material-symbols-outlined text-[14px]">location_on</span>
</button>
</div>
</section>
<!-- Lifestyle Chips -->
<section class="mb-stack-lg flex-grow">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-stack-md text-center">Your lifestyle</h2>
<div class="grid grid-cols-2 gap-3">
<!-- Selected Chip -->
<button class="py-2.5 px-4 rounded-xl font-body-sm text-body-sm text-primary bg-primary/10 border border-primary/20 shadow-sm transition-all flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]">eco</span>
                    Vegetarian
                </button>
<!-- Selected Chip -->
<button class="py-2.5 px-4 rounded-xl font-body-sm text-body-sm text-primary bg-primary/10 border border-primary/20 shadow-sm transition-all flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]">savings</span>
                    Budget-conscious
                </button>
<!-- Unselected Chips -->
<button class="py-2.5 px-4 rounded-xl font-body-sm text-body-sm text-on-surface-variant bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low transition-all flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]">school</span>
                    Student
                </button>
<button class="py-2.5 px-4 rounded-xl font-body-sm text-body-sm text-on-surface-variant bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low transition-all flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]">flight</span>
                    Frequent traveller
                </button>
<button class="py-2.5 px-4 rounded-xl font-body-sm text-body-sm text-on-surface-variant bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low transition-all flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]">family_restroom</span>
                    Family
                </button>
<!-- Selected Chip -->
<button class="py-2.5 px-4 rounded-xl font-body-sm text-body-sm text-primary bg-primary/10 border border-primary/20 shadow-sm transition-all flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]">fitness_center</span>
                    Health-conscious
                </button>
<button class="py-2.5 px-4 rounded-xl font-body-sm text-body-sm text-on-surface-variant bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low transition-all flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]">elderly</span>
                    Senior
                </button>
<button class="py-2.5 px-4 rounded-xl font-body-sm text-body-sm text-on-surface-variant bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low transition-all flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]">bedtime</span>
                    Night owl
                </button>
</div>
</section>
<!-- Bottom Actions -->
<div class="mt-auto flex flex-col items-center gap-stack-md pt-stack-md">
<button class="w-full bg-primary text-on-primary font-title-lg text-title-lg py-4 rounded-full shadow-[0_8px_20px_rgba(31,16,142,0.15)] hover:bg-primary-container transition-all active:scale-[0.98]">
                Save &amp; Continue
            </button>
<button class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors pb-safe">
                Skip for now
            </button>
</div>
