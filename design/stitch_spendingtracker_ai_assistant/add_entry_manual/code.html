<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Entry</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "surface-bright": "#fcf8ff",
                    "primary-fixed-dim": "#c3c0ff",
                    "tertiary-fixed-dim": "#b8c4ff",
                    "on-secondary-fixed": "#07006c",
                    "tertiary-fixed": "#dde1ff",
                    "on-tertiary-container": "#9dacf3",
                    "on-surface-variant": "#464553",
                    "on-secondary-container": "#fffbff",
                    "primary": "#1f108e",
                    "on-error-container": "#93000a",
                    "primary-container": "#3730a3",
                    "surface-container-high": "#eae6f1",
                    "secondary-container": "#6063ee",
                    "inverse-surface": "#303037",
                    "on-error": "#ffffff",
                    "surface-tint": "#544fc0",
                    "outline-variant": "#c8c4d5",
                    "error": "#ba1a1a",
                    "outline": "#777584",
                    "background": "#fcf8ff",
                    "tertiary": "#162766",
                    "surface-dim": "#dcd8e3",
                    "on-primary-fixed": "#0f0069",
                    "tertiary-container": "#2f3e7e",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#a9a7ff",
                    "inverse-primary": "#c3c0ff",
                    "on-primary-fixed-variant": "#3b35a7",
                    "secondary": "#4648d4",
                    "surface-container": "#f0ecf6",
                    "on-tertiary-fixed-variant": "#334282",
                    "on-surface": "#1b1b22",
                    "surface-variant": "#e4e1eb",
                    "error-container": "#ffdad6",
                    "surface-container-highest": "#e4e1eb",
                    "secondary-fixed": "#e1e0ff",
                    "on-background": "#1b1b22",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed": "#001354",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#f6f2fc",
                    "surface": "#fcf8ff",
                    "primary-fixed": "#e2dfff",
                    "secondary-fixed-dim": "#c0c1ff",
                    "on-secondary-fixed-variant": "#2f2ebe",
                    "inverse-on-surface": "#f3eff9"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter-md": "16px",
                    "base": "8px",
                    "stack-md": "16px",
                    "stack-lg": "24px",
                    "container-margin": "20px",
                    "stack-sm": "8px"
            },
            "fontFamily": {
                    "display-lg": ["Inter", "sans-serif"],
                    "label-md": ["Inter", "sans-serif"],
                    "headline-md": ["Inter", "sans-serif"],
                    "title-lg": ["Inter", "sans-serif"],
                    "body-md": ["Inter", "sans-serif"],
                    "body-sm": ["Inter", "sans-serif"]
            },
            "fontSize": {
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],

          }
        }
      }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background font-body-md antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<div class="max-w-[390px] mx-auto min-h-[884px] relative flex flex-col bg-background shadow-2xl shadow-surface-tint/10">
<!-- Header -->
<header class="fixed top-0 w-full max-w-[390px] h-16 flex items-center justify-between px-container-margin bg-background/90 backdrop-blur-[15px] z-50">
<button class="text-on-surface w-8 h-8 flex items-center justify-start active:scale-90 transition-transform" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-on-surface">Add Entry</h1>
<button class="font-label-md text-label-md text-outline tracking-wider w-8 h-8 flex items-center justify-end" disabled="" type="button">
                Save
            </button>
</header>
<!-- Main Form Content -->
<main class="flex-1 overflow-y-auto pt-24 pb-32 px-container-margin space-y-stack-lg flex flex-col">
<!-- Section 1: Amount -->
<section class="flex flex-col items-center justify-center py-stack-lg">
<div class="flex items-center text-outline transition-colors focus-within:text-on-surface">
<span class="font-headline-md text-headline-md mr-1 pb-1">₹</span>
<input class="font-display-lg text-display-lg bg-transparent border-none text-center w-32 focus:ring-0 p-0 text-on-surface placeholder:text-outline caret-primary" placeholder="0" type="number"/>
</div>
</section>
<!-- Section 2: Details Card -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(31,16,142,0.04)] p-stack-md flex flex-col gap-stack-md">
<!-- Merchant -->
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">storefront</span>
<input class="w-full pl-12 pr-4 py-3 rounded-lg border border-outline-variant bg-transparent focus:border-primary focus:border-2 focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline transition-all" placeholder="e.g. Swiggy, Big Bazaar" type="text"/>
</div>
<!-- Date & Time -->
<div class="flex gap-gutter-md">
<div class="relative flex-1 group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-hover:text-primary transition-colors pointer-events-none">calendar_today</span>
<input class="w-full pl-12 pr-2 py-3 rounded-lg border border-outline-variant bg-transparent cursor-pointer font-body-md text-body-md text-on-surface hover:border-primary transition-all focus:outline-none" readonly="" type="text" value="Today, Apr 26"/>
</div>
<div class="relative flex-1 group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-hover:text-primary transition-colors pointer-events-none">schedule</span>
<input class="w-full pl-12 pr-2 py-3 rounded-lg border border-outline-variant bg-transparent cursor-pointer font-body-md text-body-md text-on-surface hover:border-primary transition-all focus:outline-none" readonly="" type="text" value="2:45 PM"/>
</div>
</div>
<!-- Category -->
<div class="relative cursor-pointer group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary pointer-events-none">local_offer</span>
<div class="w-full pl-12 pr-4 py-3 rounded-lg border border-outline-variant bg-transparent group-hover:border-primary transition-all flex items-center justify-between">
<span class="font-body-md text-body-md text-on-surface">Food &amp; Dining 🍕</span>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
</div>
<!-- Subcategory -->
<div class="relative cursor-pointer group ml-8">
<div class="w-full px-4 py-3 rounded-lg border border-transparent bg-surface-container-low flex items-center">
<span class="font-body-sm text-body-sm text-on-surface-variant">Food Delivery</span>
</div>
</div>
<!-- Payment Method Segmented Control -->
<div class="space-y-stack-sm pt-2">
<label class="font-label-md text-label-md text-on-surface-variant px-1">Payment Method</label>
<div class="flex bg-surface-container p-1 rounded-lg">
<button class="flex-1 py-2 font-label-md text-label-md text-on-surface-variant rounded-md hover:bg-surface-variant transition-colors" type="button">Cash</button>
<button class="flex-1 py-2 font-label-md text-label-md bg-primary text-on-primary shadow-sm rounded-md flex items-center justify-center gap-1 transition-colors" type="button">
                            UPI
                            <span class="material-symbols-outlined text-[14px]">check</span>
</button>
<button class="flex-1 py-2 font-label-md text-label-md text-on-surface-variant rounded-md hover:bg-surface-variant transition-colors" type="button">Card</button>
<button class="flex-1 py-2 font-label-md text-label-md text-on-surface-variant rounded-md hover:bg-surface-variant transition-colors" type="button">Other</button>
</div>
</div>
</section>
<!-- Section 3: Optional (Collapsed) -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(31,16,142,0.04)] p-stack-md flex justify-between items-center cursor-pointer hover:bg-surface-bright transition-colors">
<span class="font-body-md text-body-md text-on-surface-variant">More details (Tags, Notes)</span>
<span class="material-symbols-outlined text-primary">add</span>
</section>
</main>
<!-- Bottom Sticky Action -->
<div class="fixed bottom-0 w-full max-w-[390px] p-container-margin pb-[calc(20px+env(safe-area-inset-bottom))] bg-gradient-to-t from-background via-background/95 to-transparent z-50 pt-12 pointer-events-none">
<button class="w-full bg-primary text-on-primary font-title-lg text-title-lg py-4 rounded-full shadow-[0_8px_20px_rgba(31,16,142,0.08)] active:scale-95 transition-transform duration-200 pointer-events-auto flex items-center justify-center gap-2" type="button">
                Save Entry
            </button>
</div>
</div>
</body></html>
